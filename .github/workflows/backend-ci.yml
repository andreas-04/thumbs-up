name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/apiv2/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/apiv2/requirements.txt
          pip install cryptography ruff

      - name: Lint with Ruff
        working-directory: ./backend/apiv2
        run: ruff check .

      - name: Check formatting with Ruff
        working-directory: ./backend/apiv2
        run: ruff format --check .

      - name: Run unit tests
        working-directory: ./backend/apiv2
        run: python -m pytest tests/ -v

      - name: Validate certificate generation
        working-directory: ./backend/pki
        run: |
          python gen_selfsigned.py --server-cn test-server --client-cn test-client --output-dir /tmp/certs
          ls -la /tmp/certs/*.pem

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/apiv2
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Validate docker compose config
        working-directory: ./backend/apiv2
        run: docker compose config --quiet
