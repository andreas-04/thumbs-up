name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/api/requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        working-directory: ./backend/api
        run: ruff check .

      - name: Check formatting with Ruff
        working-directory: ./backend/api
        run: ruff format --check .

      - name: Run unit tests
        working-directory: ./backend/api
        run: python -m pytest tests/ -v

      - name: Validate certificate generation
        working-directory: ./backend/api
        run: |
          python utils/generate_certs.py --hostname test-server --cert-path /tmp/certs/server_cert.pem --key-path /tmp/certs/server_key.pem
          ls -la /tmp/certs/*.pem

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend/api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Validate docker compose config
        run: docker compose config --quiet
