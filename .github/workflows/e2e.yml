name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run at 02:00 UTC to catch regressions
    - cron: '0 2 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose \
            -f backend/apiv2/docker-compose.yml \
            -f docker-compose.test.yml \
            up -d --build
        env:
          ADMIN_PIN: '0000'

      - name: Wait for backend health check
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' thumbsup-backend 2>/dev/null | grep -q healthy; then
              echo "Backend is healthy."
              break
            fi
            echo "  attempt $i/30 – not ready yet"
            sleep 5
          done
          docker inspect --format='{{.State.Health.Status}}' thumbsup-backend | grep -q healthy || \
            (echo "Backend did not become healthy in time." && docker logs thumbsup-backend && exit 1)

      - name: Wait for frontend health check
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 20); do
            if wget --quiet --spider http://localhost:80/ 2>/dev/null; then
              echo "Frontend is up."
              break
            fi
            echo "  attempt $i/20 – not ready yet"
            sleep 3
          done
          wget --quiet --spider http://localhost:80/ || \
            (echo "Frontend did not become healthy in time." && docker logs thumbsup-frontend && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: ./e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium firefox

      - name: Seed test data
        working-directory: ./e2e
        run: |
          npx tsx fixtures/seed.ts
        env:
          BASE_URL: 'http://localhost'
          ADMIN_EMAIL: 'admin@thumbsup.local'
          ADMIN_PASSWORD: 'admin-secret-pw'
          TEST_USER_EMAIL: 'testuser@thumbsup.local'
          TEST_USER_PASSWORD: 'user-secret-pw'

      - name: Run Playwright / Cucumber E2E tests
        working-directory: ./e2e
        run: npm test
        env:
          BASE_URL: 'http://localhost'
          ADMIN_EMAIL: 'admin@thumbsup.local'
          ADMIN_PASSWORD: 'admin-secret-pw'
          TEST_USER_EMAIL: 'testuser@thumbsup.local'
          TEST_USER_PASSWORD: 'user-secret-pw'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

      - name: Tear down services
        if: always()
        run: |
          docker compose \
            -f backend/apiv2/docker-compose.yml \
            -f docker-compose.test.yml \
            down -v
