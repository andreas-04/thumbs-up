name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          TAG=${GITHUB_REF_NAME}
          zip -r "thumbs-up-${TAG}-source.zip" . \
            --exclude "*.git*" \
            --exclude "*node_modules*" \
            --exclude "*.pem" \
            --exclude "*.key" \
            --exclude "*.crt" \
            --exclude "*.db" \
            --exclude "config.env"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: thumbs-up-${{ github.ref_name }}-source.zip
          generate_release_notes: true
