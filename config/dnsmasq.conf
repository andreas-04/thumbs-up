# dnsmasq configuration for ThumbsUp WiFi Access Point fallback
#
# Install to: /etc/dnsmasq.conf
# Managed by: wifi-fallback.service (via wifi-check.sh)

# Only listen on the AP interface
interface=wlan0

# Do not forward plain (non-dotted) names to upstream DNS
domain-needed
# Do not forward RFC-1918 reverse-lookup queries
bogus-priv

# Hand out IPs in the 192.168.4.10–50 range, lease time 24h
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,24h

# Set the Pi as the default gateway
dhcp-option=option:router,192.168.4.1

# Set DNS server (Pi itself)
dhcp-option=option:dns-server,192.168.4.1
