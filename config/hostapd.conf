# hostapd configuration for ThumbsUp WiFi Access Point fallback
#
# Install to: /etc/hostapd/hostapd.conf
# Managed by: wifi-fallback.service (via wifi-check.sh)
#
# The passphrase is supplied by setup.sh (read from .env / prompted at setup
# time) and substituted for the AP_PASSPHRASE placeholder below.

interface=wlan0
driver=nl80211

# ---- Network identity ----
ssid=ThumbsUp-AP
# WPA2 passphrase — replaced by setup.sh with the value from .env
wpa_passphrase=AP_PASSPHRASE

# ---- Radio settings ----
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1

# ---- Security ----
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
