# hostapd configuration for ThumbsUp WiFi Access Point fallback
#
# Install to: /etc/hostapd/hostapd.conf
# Managed by: wifi-fallback.service (via wifi-check.sh)
#
# Edit SSID and passphrase before deploying.

interface=wlan0
driver=nl80211

# ---- Network identity ----
ssid=ThumbsUp-AP
# WPA2 passphrase (8–63 characters)
# setup.sh replaces this with a random passphrase on first install.
wpa_passphrase=thumbsup123

# ---- Radio settings ----
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1

# ---- Security ----
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
