# Docker Compose override for the E2E test environment.
# Provides a clean, deterministic setup with an ephemeral SQLite database.
#
# Usage:
#   docker compose -f backend/apiv2/docker-compose.yml -f docker-compose.test.yml up -d --build

services:
  backend:
    environment:
      # Deterministic credentials used by E2E tests
      - ADMIN_PIN=0000
      - TOKEN_EXPIRY_HOURS=24
      - ENABLE_UPLOADS=true
      - ENABLE_DELETE=true
    volumes:
      # Override the named volume with a tmpfs mount so the DB is wiped on every run
      - type: tmpfs
        target: /app/data
      - type: tmpfs
        target: /app/storage

  frontend:
    # No overrides needed; inherits from base compose file
    depends_on:
      backend:
        condition: service_healthy
