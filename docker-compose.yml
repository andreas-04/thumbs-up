version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: terracrate-backend
    hostname: ${MDNS_HOSTNAME:-terracrate}
    network_mode: host
    environment:
      - ADMIN_PIN=${ADMIN_PIN:-1234}
      - HOST=0.0.0.0
      - PORT=8443
      - MDNS_HOSTNAME=${MDNS_HOSTNAME:-terracrate}
      - TOKEN_EXPIRY_HOURS=24
      - ENABLE_UPLOADS=true
      - ENABLE_DELETE=true
      - SERVICE_NAME=Terracrate File Share
      - CORS_ORIGINS=*
    volumes:
      - ./backend/api/storage:/app/storage
      - terracrate-db:/app/data
      - terracrate-certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('https://localhost:8443/health', context=__import__('ssl')._create_unverified_context())"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: terracrate-frontend
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - terracrate-certs:/etc/nginx/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--no-verbose", "--tries=1", "--spider", "https://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  terracrate-db:
    driver: local
  terracrate-certs:
    driver: local
  thumbsup-guest-storage:
    driver: local
