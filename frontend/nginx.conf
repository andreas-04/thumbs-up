# ─────────────────────────────────────────────────────────────
# TerraCrate nginx – mTLS split configuration
#
# Open (no client cert):
#   /login, /signup, /reset-password,
#   /admin/*, all /api/* routes (JWT-protected by backend),
#   and static Vite assets.
#
# mTLS required:
#   Regular user pages — /files, /guest/files, etc.
#
# Admin never needs a client cert — JWT auth only.
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server_cert.pem;
    ssl_certificate_key /etc/nginx/certs/server_key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # mTLS: the server cert doubles as the CA that signs client certs.
    # "optional" lets us decide per-location whether to enforce.
    ssl_client_certificate /etc/nginx/certs/server_cert.pem;
    ssl_verify_client      optional;

    # Certificate Revocation List — reject revoked client certs at the TLS layer.
    # The backend regenerates this file and it is picked up on nginx reload.
    ssl_crl /etc/nginx/certs/crl.pem;

    underscores_in_headers on;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API routes (no cert — backend JWT auth handles access) ───

    location /api/ {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
        proxy_pass_request_headers on;
        proxy_ssl_verify off;
    }

    # ── Static assets (no cert required) ─────────────────────────

    # Vite-built static assets (JS, CSS, fonts, images)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets at root level (favicon, etc.)
    location ~* ^/[^/]+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Open SPA pages (no cert required) ────────────────────────

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /login {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /signup {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /reset-password {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /cert-required {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Admin pages — no cert, JWT auth only
    location /admin {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Protected SPA catch-all (mTLS enforced) ─────────────────
    # Regular user routes: /files, /guest/files, etc.

    location / {
        if ($ssl_client_verify != SUCCESS) {
            return 302 /cert-required;
        }

        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html when served directly
    location = /index.html {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Friendly redirect when client cert is missing (nginx 496 = no cert)
    error_page 496 = @no_cert;
    location @no_cert {
        return 302 /cert-required;
    }

    error_page 404 /index.html;
}
